<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralis AI Chat Widget</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Exact Auralis Dashboard Palette */
            --auralis-bg: #0B0F17;
            --auralis-surface: #151B28;
            --auralis-surface-alt: #1E293B;
            --auralis-border: #2D3A4F;
            --auralis-accent: #3B82F6;
            --auralis-text-primary: #F8FAFC;
            --auralis-text-secondary: #CBD5E1;
            --auralis-text-muted: #64748B;
            --auralis-radius: 12px;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Container */
        .auralis-widget-root {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 99999;
        }

        /* Toggle Button - Premium Square */
        .auralis-toggle {
            width: 56px;
            height: 56px;
            background: var(--auralis-accent);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--auralis-radius);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .auralis-toggle:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.5);
        }

        .auralis-toggle svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* Widget Window */
        .auralis-window {
            position: absolute;
            bottom: 72px;
            right: 0;
            width: 400px;
            height: 600px;
            background: var(--auralis-surface);
            border: 1px solid var(--auralis-border);
            border-radius: var(--auralis-radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            display: none;
            flex-direction: column;
            overflow: hidden;
            transform-origin: bottom right;
            animation: auralis-fade-in 0.25s ease-out;
        }

        @keyframes auralis-fade-in {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auralis-window.active {
            display: flex;
        }

        /* Header - Compact & Branded */
        .auralis-header {
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--auralis-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--auralis-accent);
        }

        .header-text h3 {
            font-family: 'Outfit', sans-serif;
            color: var(--auralis-text-primary);
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .header-text p {
            color: var(--auralis-text-muted);
            font-size: 12px;
            margin: 2px 0 0 0;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--auralis-text-muted);
            cursor: pointer;
            padding: 4px;
            display: flex;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--auralis-text-primary);
        }

        /* Message Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--auralis-bg);
        }

        .msg {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg-content {
            padding: 12px 14px;
            font-size: 14.5px;
            line-height: 1.55;
            border-radius: var(--auralis-radius);
        }

        /* Bot Message - Minimal & Outlined */
        .msg.bot {
            align-self: flex-start;
        }

        .msg.bot .msg-content {
            background: transparent;
            border: 1px solid var(--auralis-border);
            color: var(--auralis-text-secondary);
            border-bottom-left-radius: 4px;
        }

        /* User Message - Solid & Focused */
        .msg.user {
            align-self: flex-end;
        }

        .msg.user .msg-content {
            background: var(--auralis-surface-alt);
            border: 1px solid var(--auralis-border);
            color: var(--auralis-text-primary);
            border-bottom-right-radius: 4px;
        }

        /* Actions - Subtle Icons */
        .msg-actions {
            display: flex;
            gap: 10px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .msg:hover .msg-actions {
            opacity: 1;
        }

        .action-icon {
            background: transparent;
            border: none;
            padding: 2px;
            cursor: pointer;
            color: var(--auralis-text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-family: inherit;
        }

        .action-icon:hover {
            color: var(--auralis-accent);
        }

        .action-icon svg {
            width: 14px;
            height: 14px;
        }

        /* Input Pill - Deep Slate */
        .input-wrapper {
            padding: 20px;
            background: var(--auralis-surface);
            border-top: 1px solid var(--auralis-border);
        }

        .input-field-container {
            background: var(--auralis-bg);
            border: 1px solid var(--auralis-border);
            border-radius: var(--auralis-radius);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color 0.2s;
        }

        .input-field-container:focus-within {
            border-color: var(--auralis-accent);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--auralis-text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            padding: 4px 0;
            resize: none;
            max-height: 100px;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--auralis-text-muted);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .control-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--auralis-text-primary);
        }

        .send-btn-active {
            color: var(--auralis-accent) !important;
        }

        /* States */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px;
            align-self: flex-start;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: var(--auralis-text-muted);
            border-radius: 50%;
            animation: dot-jump 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        /* Voice State overlay - Minimal */
        .voice-mode {
            position: absolute;
            inset: 0;
            background: rgba(11, 15, 23, 0.9);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .voice-mode.active { display: flex; }

        .wave-container {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 48px;
            margin-bottom: 20px;
        }

        .wave {
            width: 3px;
            height: 12px;
            background: var(--auralis-accent);
            border-radius: 2px;
            animation: wave-motion 1.2s infinite ease-in-out;
        }

        @keyframes wave-motion {
            0%, 100% { height: 12px; }
            50% { height: 48px; }
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar { width: 4px; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--auralis-border); border-radius: 10px; }

        @media (max-width: 480px) {
            .auralis-window { width: 100%; height: 100%; bottom: 0; transform: none; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="auralis-widget-root">
        <!-- Toggle -->
        <button class="auralis-toggle" id="auralisToggle" onclick="toggleChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 3L14.5 9H21L16 13L18 20L12 16L6 20L8 13L3 9H9.5L12 3Z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Window -->
        <div class="auralis-window" id="auralisWindow">
            <div class="voice-mode" id="voiceMode">
                <div class="wave-container">
                    <div class="wave" style="animation-delay: 0.1s"></div>
                    <div class="wave" style="animation-delay: 0.2s"></div>
                    <div class="wave" style="animation-delay: 0.3s"></div>
                    <div class="wave" style="animation-delay: 0.4s"></div>
                    <div class="wave" style="animation-delay: 0.5s"></div>
                </div>
                <p style="color: white; font-size: 14px; font-weight: 500; margin: 0">Auralis Listening...</p>
                <button onclick="stopVoice()" style="background: transparent; border: 1px solid var(--auralis-border); color: white; margin-top: 24px; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px">Cancel</button>
            </div>

            <!-- Header -->
            <div class="auralis-header">
                <div class="header-content">
                    <div class="brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 3L14.5 9H21L16 13L18 20L12 16L6 20L8 13L3 9H9.5L12 3Z" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="header-text">
                        <h3>Auralis AI</h3>
                        <p>Voice Intelligence Support</p>
                    </div>
                </div>
                <button class="close-btn" onclick="toggleChat()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Messages -->
            <div class="messages-container" id="msgContainer"></div>

            <!-- Input -->
            <div class="input-wrapper">
                <div class="input-field-container">
                    <textarea 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="Ask Auralis AI..." 
                        rows="1"
                        oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px';checkInput()"
                    ></textarea>
                    
                    <button class="control-btn" onclick="toggleVoice()" id="micBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1v10M19 10v1a7 7 0 0 1-14 0v-1M12 18v4M8 22h8" />
                            <rect x="9" y="1" width="6" height="13" rx="3" />
                        </svg>
                    </button>
                    
                    <button class="control-btn" id="sendBtn" onclick="sendMessage()" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'auralis_v2_history';
        let messages = [];
        let isTyping = false;
        let isOpen = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            scrollToEnd();
        });

        function toggleChat() {
            isOpen = !isOpen;
            document.getElementById('auralisWindow').classList.toggle('active', isOpen);
            if (isOpen) document.getElementById('chatInput').focus();
        }

        function loadHistory() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                messages = JSON.parse(saved);
                messages.forEach(m => renderMessage(m.text, m.sender));
            } else {
                addMessage("Hello! I'm Auralis AI. I can assist you with your voice agents and analytics. How can I help today?", "bot");
            }
        }

        function addMessage(text, sender) {
            messages.push({ text, sender, time: Date.now() });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            renderMessage(text, sender);
            scrollToEnd();
        }

        function renderMessage(text, sender) {
            const container = document.getElementById('msgContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            
            let html = `<div class="msg-content">${text}</div>`;
            
            if (sender === 'bot') {
                html += `
                    <div class="msg-actions">
                        <button class="action-icon" onclick="playVoice('${text.replace(/'/g, "\\'")}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07" />
                            </svg>
                            Voice
                        </button>
                    </div>
                `;
            }
            
            msgDiv.innerHTML = html;
            container.appendChild(msgDiv);
        }

        function checkInput() {
            const val = document.getElementById('chatInput').value.trim();
            const btn = document.getElementById('sendBtn');
            btn.disabled = !val || isTyping;
            if (!btn.disabled) btn.classList.add('send-btn-active');
            else btn.classList.remove('send-btn-active');
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || isTyping) return;

            addMessage(text, 'user');
            input.value = '';
            input.style.height = 'auto';
            checkInput();

            showTyping();
            
            try {
                // Mock smart delay
                await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));
                hideTyping();
                const reply = getAuralisReply(text);
                addMessage(reply, 'bot');
            } finally {
                isTyping = false;
            }
        }

        function showTyping() {
            isTyping = true;
            const container = document.getElementById('msgContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'typing';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            container.appendChild(typingDiv);
            scrollToEnd();
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function getAuralisReply(input) {
            const replies = [
                "I've updated your agent's voice settings to improve clarity in high-noise environments.",
                "Based on recent analytics, your response times have improved by 12%. Would you like a detailed report?",
                "I can certainly help you integrate the new Cobalt theme into your custom web-hooks.",
                "That configuration looks optimal. I'll monitor the performance over the next 24 hours."
            ];
            return replies[Math.floor(Math.random() * replies.length)];
        }

        function playVoice(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        function toggleVoice() {
            document.getElementById('voiceMode').classList.add('active');
            // Mock recognition stop after 3s
            setTimeout(() => stopVoice(), 3000);
        }

        function stopVoice() {
            document.getElementById('voiceMode').classList.remove('active');
        }

        function scrollToEnd() {
            const c = document.getElementById('msgContainer');
            c.scrollTop = c.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        document.getElementById('chatInput').addEventListener('keypress', handleKeyPress);
    </script>
</body>
</html>
